<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="transparent"/>
  <!-- Top horizontal bar -->
  <rect x="15" y="15" width="70" height="8" rx="4" fill="#333333"/>
  <!-- Arch/Bridge -->
  <path d="M 25 23 L 25 80" stroke="#333333" stroke-width="8" stroke-linecap="round"/>
  <path d="M 75 23 L 75 80" stroke="#333333" stroke-width="8" stroke-linecap="round"/>
  <path d="M 25 50 Q 50 20 75 50" fill="none" stroke="#2A75FF" stroke-width="8" stroke-linecap="round"/>
  <!-- Inner box (forming the lower part of 南) -->
  <rect x="35" y="45" width="30" height="25" fill="none" stroke="#333333" stroke-width="8" rx="4"/>
  <line x1="50" y1="45" x2="50" y2="70" stroke="#333333" stroke-width="8"/>
</svg>
